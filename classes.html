// Phir Hum Constructor Kyun Banate Hain?  Jab object create hote hi usko initial values deni hon.


class Students {
    constructor(name, age) {
        this.name = name;
        // this ke bina:

// 👉 data “object ke andar store hi nahi hota”
        this.age = age;
    }

    introduce() {
        console.log(`My name is ${this.name} and I am ${this.age} years old.`);
    }
}

const student1 = new Students("Manal", 23);
const student2 = new Students("Ali", 21);

// Yahan constructor object bante waqt data receive kar raha hai.

student1.introduce();
student2.introduce();
